name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Configure Gradle memory
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError" >> ~/.gradle/gradle.properties
          echo "kotlin.daemon.jvm.options=-Xmx2g -XX:MaxMetaspaceSize=512m" >> ~/.gradle/gradle.properties

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install expo-cli
        run: npm install @expo/cli --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_PUBLIC_API_URL: https://dhanraj-bike-production.up.railway.app
          NODE_ENV: production

      - name: Bundle JS manually
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res
        env:
          EXPO_PUBLIC_API_URL: https://dhanraj-bike-production.up.railway.app
          NODE_ENV: production

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g" \
            -Dkotlin.daemon.jvm.options="-Xmx2g -XX:MaxMetaspaceSize=512m"
        env:
          EXPO_PUBLIC_API_URL: https://dhanraj-bike-production.up.railway.app
          NODE_ENV: production

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dhanraj-bike-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
