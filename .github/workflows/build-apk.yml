name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=512m" \
            2>&1 | tee build.log
          exit ${PIPESTATUS[0]}


      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_PUBLIC_API_URL: https://dhanraj-bike-production.up.railway.app
          NODE_ENV: production

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g" \
            -Dkotlin.daemon.jvm.options="-Xmx2g -XX:MaxMetaspaceSize=512m" \
            2>&1 | tee build.log
          exit ${PIPESTATUS[0]}
        env:
          EXPO_PUBLIC_API_URL: https://dhanraj-bike-production.up.railway.app
          NODE_ENV: production

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: android/build.log
          if-no-files-found: warn

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dhanraj-bike-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
