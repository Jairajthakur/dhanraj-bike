name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN_2 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Verify Expo authentication
        run: eas whoami

      - name: Build APK (local)
        run: eas build --platform android --profile preview --non-interactive --local --output ./build/app.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: project2-apk
          path: ./build/app.apk
          retention-days: 30

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ./build/app.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
